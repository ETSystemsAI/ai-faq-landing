<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI FAQ Assistant — ETSystemsAI</title>
<style>
  :root {
    --indigo: #4F46E5;
    --indigo-dark: #3730A3;
    --indigo-soft: #EEF2FF;
    --ink: #111827;
    --slate: #6B7280;
    --slate-light: #9CA3AF;
    --border: #E5E7EB;
    --white: #FFFFFF;
    --bg: #FAFAFB;
    --sky: #0EA5E9;
    --sky-soft: #E0F2FE;
    --mint: #10B981;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    color: var(--ink);
    background: var(--white);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }
  section { padding: 96px 0; }
  @media (max-width: 768px) { section { padding: 64px 0; } }

  .kicker {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    color: var(--indigo); text-transform: uppercase; margin-bottom: 16px;
  }
  .kicker::before {
    content: ""; width: 10px; height: 10px; border-radius: 3px;
    background: var(--indigo); display: inline-block;
  }

  h1, h2, h3 { font-weight: 800; line-height: 1.15; letter-spacing: -0.02em; }
  h2 { font-size: 36px; margin-bottom: 16px; }
  @media (max-width: 768px) { h2 { font-size: 28px; } }
  .lede { font-size: 18px; color: var(--slate); max-width: 640px; line-height: 1.5; }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
  }
  nav .wrap { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 16px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 8px; background: var(--indigo);
    color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800;
  }
  .nav-cta {
    background: var(--indigo); color: white; padding: 10px 20px; border-radius: 24px;
    font-weight: 700; font-size: 14px; text-decoration: none; transition: background 0.15s;
  }
  .nav-cta:hover { background: var(--indigo-dark); }

  /* HERO */
  .hero { position: relative; overflow: hidden; padding: 120px 0 96px; }
  .hero .blob-a {
    position: absolute; top: -180px; right: -120px; width: 520px; height: 520px;
    border-radius: 50%; background: var(--indigo-soft); z-index: -2;
  }
  .hero .blob-b {
    position: absolute; bottom: -120px; right: 220px; width: 220px; height: 220px;
    border-radius: 50%; background: var(--sky); opacity: 0.18; z-index: -2;
  }
  .hero h1 { font-size: 56px; max-width: 760px; }
  @media (max-width: 768px) { .hero h1 { font-size: 36px; } }
  .hero .lede { font-size: 19px; margin: 24px 0 32px; }
  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--indigo); color: white; padding: 14px 28px; border-radius: 26px;
    font-weight: 700; font-size: 15px; text-decoration: none; display: inline-block;
    transition: background 0.15s, transform 0.15s;
  }
  .btn-primary:hover { background: var(--indigo-dark); transform: translateY(-1px); }
  .btn-secondary {
    background: var(--white); color: var(--ink); padding: 14px 28px; border-radius: 26px;
    font-weight: 700; font-size: 15px; text-decoration: none; border: 1px solid var(--border);
    display: inline-block; transition: border-color 0.15s;
  }
  .btn-secondary:hover { border-color: var(--indigo); }
  .pill {
    display: inline-flex; align-items: center; gap: 10px; background: var(--indigo-soft);
    color: var(--indigo-dark); font-weight: 700; font-size: 13px; padding: 10px 18px;
    border-radius: 24px; margin-top: 28px;
  }
  .pill .dot { width: 18px; height: 18px; border-radius: 50%; background: var(--indigo); display: flex; align-items: center; justify-content: center; }
  .pill .dot::after { content: "✓"; color: white; font-size: 10px; font-weight: 900; }

  /* GRID CARDS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 48px; }
  @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
  .card {
    background: var(--white); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; box-shadow: 0 1px 3px rgba(17,24,39,0.04);
  }
  .card-icon {

    display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 16px;
  }
  .card h3 { font-size: 18px; margin-bottom: 8px; }
  .card p { color: var(--slate); font-size: 14.5px; }

  /* ALT BG SECTION */
  .alt-bg { background: var(--bg); }

  /* HOW IT WORKS FLOW */
  .flow { display: flex; align-items: stretch; gap: 12px; margin-top: 48px; flex-wrap: wrap; }
  .flow-step {
    flex: 1; min-width: 140px; background: var(--indigo-soft); border-radius: 16px;
    padding: 24px 16px; text-align: center;
  }
  .flow-step.active { background: var(--indigo); color: white; }

    width: 56px; height: 56px; border-radius: 50%; background: white; margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .flow-step p { font-size: 14px; font-weight: 600; }
  .flow-arrow { display: flex; align-items: center; color: var(--indigo); font-size: 22px; font-weight: 700; }
  @media (max-width: 768px) { .flow-arrow { display: none; } }
  .note-box {
    background: var(--bg); border-radius: 12px; padding: 16px 20px; margin-top: 24px;
    font-size: 14px; color: var(--slate); font-style: italic;
  }

  /* LIVE DEMO */
  .demo-box {
    background: linear-gradient(135deg, var(--indigo), #6366F1); border-radius: 24px;
    padding: 56px 48px; text-align: center; margin-top: 48px; color: white;
  }
  .demo-box h3 { font-size: 26px; margin-bottom: 12px; }
  .demo-box p { color: #DBE3FF; max-width: 520px; margin: 0 auto 28px; font-size: 15.5px; }
  .demo-questions {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 28px;
  }
  .demo-chip {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
    color: white; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-style: italic;
  }
  .btn-white {
    background: white; color: var(--indigo); padding: 14px 32px; border-radius: 26px;
    font-weight: 700; font-size: 15px; text-decoration: none; display: inline-block;
  }

  /* LANGUAGES */
  .lang-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
  .lang-chip {
    border: 1.5px solid var(--border); padding: 10px 20px; border-radius: 24px;
    font-size: 14px; font-weight: 600; background: white;
  }
  .lang-chip.cta { background: var(--indigo); color: white; border: none; }
  .info-card {
    background: white; border: 1px solid var(--border); border-radius: 16px;
    padding: 28px; margin-top: 32px; display: flex; gap: 20px; align-items: center;
    box-shadow: 0 1px 3px rgba(17,24,39,0.04);
  }
  .info-card .card-icon { flex-shrink: 0; margin-bottom: 0; }
  .info-card p { color: var(--ink); font-size: 15px; }

  /* WHY DIFFERENT ROWS */
  .feature-row {
    display: flex; gap: 20px; align-items: flex-start; background: var(--bg);
    border-radius: 16px; padding: 24px; margin-bottom: 16px;
  }
  .feature-row .card-icon { background: white; border: 1px solid var(--border); margin-bottom: 0; flex-shrink: 0; }
  .feature-row h3 { font-size: 18px; margin-bottom: 6px; }
  .feature-row p { color: var(--slate); font-size: 14.5px; }

  /* PROCESS STEPS */
  .steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 48px; }
  @media (max-width: 768px) { .steps { grid-template-columns: 1fr 1fr; } }
  .step-card {
    background: white; border: 1px solid var(--border); border-radius: 16px;
    padding: 24px 16px; text-align: center; box-shadow: 0 1px 3px rgba(17,24,39,0.04);
  }
  .step-num {
    width: 44px; height: 44px; border-radius: 50%; background: var(--indigo); color: white;
    display: flex; align-items: center; justify-content: center; font-weight: 800; margin: 0 auto 14px;
  }
  .step-card h4 { font-size: 15px; margin-bottom: 6px; }
  .step-card p { font-size: 12.5px; color: var(--slate); }

  /* ENGAGEMENT */
  .engage-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 20px; margin-top: 48px; }
  @media (max-width: 768px) { .engage-grid { grid-template-columns: 1fr; } }
  .engage-card { border-radius: 16px; padding: 32px; }
  .engage-card.light { background: var(--bg); }
  .engage-card.dark { background: var(--indigo); color: white; }
  .engage-label { font-size: 12.5px; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 18px; }
  .engage-card.light .engage-label { color: var(--indigo); }
  .engage-card.dark .engage-label { color: #C7D2FE; }
  .check-list li {
    list-style: none; display: flex; align-items: center; gap: 12px; margin-bottom: 14px; font-size: 15px;
  }
  .check-list .check-dot {
    width: 24px; height: 24px; border-radius: 50%; background: var(--mint); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 900;
  }
  .engage-card.dark p { color: white; font-size: 15px; line-height: 1.6; margin-bottom: 20px; }
